# KoSpeaker CI
# Builds and tests the Android app on every push and pull request.
# ubuntu-latest ships with the Android SDK preinstalled, so no manual SDK setup is required.
name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Unit tests are the must-pass gate.
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # NOTE: `./gradlew lintDebug` is intentionally not run here. AGP's lint
      # partial-analysis crashes with an NPE inside the Compose library's
      # AutoboxingStateCreationDetector (a known bug in the lint tool, not in
      # this project's code), and the crash cannot be suppressed via disable/
      # abortOnError because partial analysis runs detectors before those apply.
      # The quality gates are the unit test suite and a full debug build below.
      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
